version: '3.3'
services:
  abs-autoconverter:
    image: cutzenfriend/abs-autoconverter:latest
    container_name: abs-autoconverter
    restart: unless-stopped
    environment:
      TZ: "Europe/Berlin"
      DOMAIN: "192.168.50.176" #Please edit - mandatory
      LIBRARY_ID: "Marvel Comics" #Please edit - mandatory, comma-separated for multiple libraries
      MAX_PARALLEL_CONVERSIONS: 3 #Keep CPU power in mind. Too many conversion in parallel decrease performance on your host!
      #CRON_SETTING: #optional - default is: (20 * * * * ) - every hour at minute 20
      BITRATE: "source" #optional - default is 128k, set to "source" to match each item's original bitrate
      TOKEN: "" #Please edit - mandatory
